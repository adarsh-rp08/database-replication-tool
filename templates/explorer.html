<!DOCTYPE html>
<html>

<head>

<title>Database Explorer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="mb-4">
Database Explorer
</h2>

<a href="/dashboard"
class="btn btn-secondary mb-3">

Back to Dashboard

</a>

<form method="POST">

<label class="form-label">
Select Database
</label>

<select
name="database"
class="form-select">

{% for connection in connections %}

<option
value="{{ connection[0] }}"
{% if selected_database == connection[0] %}
selected
{% endif %}
>

{{ connection[0] }}

</option>

{% endfor %}

</select>

<br>

<button
type="submit"
class="btn btn-primary">

Load Objects

</button>

{% if tables %}

<hr>

<h4>
Available Objects
</h4>

<select
name="selected_table"
class="form-select">

{% for table in tables %}

<option value="{{ table[0] }}">

{{ table[0] }}

</option>

{% endfor %}

</select>

<br>

<button
name="preview"
value="1"
type="submit"
class="btn btn-info">

Preview Data

</button>

{% endif %}

{% if preview_rows %}

<hr>

<h4>
Table Preview
</h4>

<table class="table table-bordered table-striped">

<thead>

<tr>

{% for column in preview_columns %}

<th>{{ column }}</th>

{% endfor %}

</tr>

</thead>

<tbody>

{% for row in preview_rows %}

<tr>

{% for value in row %}

<td>{{ value }}</td>

{% endfor %}

</tr>

{% endfor %}

</tbody>

</table>

{% endif %}

</form>

</div>

</div>

</div>

</body>

</html>
