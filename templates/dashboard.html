<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h1 class="mb-4">
Database Replication Tool
</h1>

<div class="row">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h5>Databases</h5>

<h2>{{ connection_count }}</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h5>Sync Jobs</h5>

<h2>{{ sync_count }}</h2>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h5>Logs</h5>

<h2>{{ log_count }}</h2>

</div>

</div>

</div>

</div>

<br>

{% if session['role'] == 'ADMIN' %}

<a href="/replication"
class="btn btn-success">

Replication Tool

</a>

<a href="/sync-history"
class="btn btn-primary">

Sync History

</a>

<a href="/logs"
class="btn btn-info">

Logs

</a>


{% endif %}

<a href="/explorer"
class="btn btn-secondary">

Database Explorer

</a>

<a href="/logout"
class="btn btn-danger">

Logout

</a>

</div>

</body>

</html>
