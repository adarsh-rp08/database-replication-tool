<!DOCTYPE html>
<html>

<head>

<title>Sync History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2>
Synchronization History
</h2>
<a
href="/dashboard"
class="btn btn-secondary mb-3">

Back to Dashboard

</a>
<table class="table table-bordered table-striped">

<tr>

<th>ID</th>
<th>Source</th>
<th>Destination</th>
<th>Objects</th>
<th>Inserted</th>
<th>Updated</th>
<th>Status</th>
<th>Run Time</th>

</tr>

{% for job in jobs %}

<tr>

<td>{{ job[0] }}</td>
<td>{{ job[5] }}</td>
<td>{{ job[6] }}</td>
<td>{{ job[7] }}</td>
<td>{{ job[8] }}</td>
<td>{{ job[9] }}</td>
<td>{{ job[4] }}</td>
<td>{{ job[2] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
