<!DOCTYPE html>
<html>
<head>

    <title>Audit Logs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Audit Logs</h2>
<a href="/dashboard"
class="btn btn-secondary mb-3">

Back to Dashboard

</a>
    <table class="table table-bordered table-striped">

        <thead>

            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Activity</th>
                <th>Status</th>
                <th>Time</th>
            </tr>

        </thead>

        <tbody>

        {% for log in logs %}

            <tr>

                <td>{{ log[0] }}</td>
                <td>{{ log[1] }}</td>
                <td>{{ log[2] }}</td>
                <td>{{ log[3] }}</td>
                <td>{{ log[4] }}</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
